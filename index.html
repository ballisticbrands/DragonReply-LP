<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DragonReply — Your customers, answered automatically</title>
  <meta name="description" content="DragonReply answers your Amazon buyer messages for you — fast, on-brand, and TOS-safe. Free forever.">
  <style>
    :root{--forest:#2F7D4F;--lime:#98CC65;--deep:#0F3D2E;--ink:#1A1A1A;
      --sys:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--sys);background:var(--deep);color:#fff;min-height:100vh;
      display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .wrap{max-width:640px;}
    .logo{font-size:44px;margin-bottom:20px;}
    h1{font-size:clamp(34px,7vw,60px);font-weight:800;letter-spacing:-.035em;line-height:1.05;}
    h1 .gr{background:linear-gradient(to right,var(--forest),var(--lime));
      -webkit-background-clip:text;background-clip:text;color:transparent;}
    p{margin-top:18px;font-size:clamp(16px,2.5vw,20px);line-height:1.6;color:rgba(255,255,255,.72);}
    .badge{margin-top:28px;display:inline-block;padding:9px 16px;border:1px solid rgba(152,204,101,.4);
      border-radius:999px;font-size:14px;color:var(--lime);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🐉</div>
    <h1>Dragon<span class="gr">Reply</span></h1>
    <p>Your customers, answered — automatically. DragonReply replies to your Amazon buyer messages for you: fast, on-brand, and TOS-safe, so support never eats your day again.</p>
    <div class="badge">Coming soon · Free forever</div>
  </div>
</body>
</html>
